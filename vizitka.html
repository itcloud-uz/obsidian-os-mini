<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obsidian OS Mini - Vizitka</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            --card-bg: rgba(255, 255, 255, 0.45);
            --border: rgba(255, 255, 255, 0.6);
            --text-main: #1e293b;
            --text-sub: #475569;
            --primary: #6366f1;
            --secondary: #a855f7;
        }
        
        * { box-sizing: border-box; }
        
        body { 
            margin: 0; 
            font-family: 'Outfit', sans-serif; 
            background: var(--bg-gradient); 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 20px; 
            overflow-x: hidden;
            color: var(--text-main);
        }
        
        .blob { position: fixed; border-radius: 50%; filter: blur(80px); z-index: 1; opacity: 0.5; animation: float 15s infinite alternate ease-in-out; }
        .blob-1 { width: 400px; height: 400px; background: #c084fc; top: -100px; left: -100px; }
        .blob-2 { width: 450px; height: 450px; background: #818cf8; bottom: -150px; right: -150px; }
        
        @keyframes float {
            0% { transform: translate(0, 0) rotate(0deg) scale(1); }
            100% { transform: translate(40px, 40px) rotate(15deg) scale(1.1); }
        }

        .glass-card { 
            position: relative; 
            z-index: 10; 
            background: var(--card-bg); 
            backdrop-filter: blur(30px); 
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--border); 
            border-radius: 40px; 
            padding: 50px 25px; 
            width: 100%; 
            max-width: 380px; 
            text-align: center; 
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.15);
            animation: cardAppear 1s cubic-bezier(0.2, 1, 0.2, 1);
        }

        @keyframes cardAppear {
            0% { opacity: 0; transform: translateY(50px) scale(0.9); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .logo-container { width: 110px; height: 110px; margin: 0 auto 25px; position: relative; }
        .profile-pic { 
            width: 100%; height: 100%; 
            background: white; 
            border-radius: 35px; 
            display: flex; justify-content: center; align-items: center; 
            font-size: 45px; color: #334155; 
            border: 2px solid rgba(255,255,255,0.9);
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
            object-fit: cover;
            overflow: hidden;
        }

        h1 { margin: 0 0 10px; font-size: 30px; font-weight: 800; color: #0f172a; letter-spacing: -1px; line-height: 1.1; }
        p.subtitle { margin: 0 0 35px; font-size: 16px; color: var(--text-sub); font-weight: 500; opacity: 0.9; }
        
        .actions-row { 
            display: flex; 
            justify-content: center; 
            gap: 10px; 
            margin-bottom: 35px; 
            width: 100%;
        }
        .action-btn { 
            flex: 1;
            max-width: 145px;
            padding: 14px 10px; 
            border-radius: 20px; 
            border: none; 
            background: #0f172a; 
            color: white; 
            cursor: pointer;
            font-size: 13px; 
            font-weight: 700; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 6px;
            box-shadow: 0 10px 20px -5px rgba(15, 23, 42, 0.2);
            white-space: nowrap;
        }
        .action-btn:hover { transform: translateY(-3px); box-shadow: 0 15px 25px -5px rgba(15, 23, 42, 0.3); }
        .action-btn.secondary { 
            background: white; 
            color: #0f172a; 
            box-shadow: 0 8px 15px rgba(0,0,0,0.05); 
            border: 1px solid rgba(0,0,0,0.05);
        }

        .services-section { text-align: left; margin-bottom: 35px; }
        .service-title { font-size: 18px; font-weight: 800; margin-bottom: 15px; color: #0f172a; display: flex; align-items: center; gap: 8px; }
        .service-card { 
            background: rgba(255, 255, 255, 0.5); 
            padding: 16px; border-radius: 20px; margin-bottom: 12px; 
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: 0.3s;
        }
        .s-name { font-weight: 700; font-size: 15px; color: #1e293b; }
        .s-desc { font-size: 13px; color: #64748b; line-height: 1.4; }
        .s-price { font-weight: 800; color: #6366f1; font-size: 14px; margin-top: 8px; }

        .buttons-grid { display: flex; flex-direction: column; gap: 15px; margin-bottom: 40px; }
        .btn { 
            display: flex; align-items: center; justify-content: center; gap: 14px; 
            width: 100%; padding: 18px; 
            border-radius: 22px; text-decoration: none; 
            background: rgba(255, 255, 255, 0.8); 
            border: 1px solid rgba(255, 255, 255, 1); 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            font-weight: 600; font-size: 17px; 
            color: #1e293b;
        }
        .btn:hover { transform: translateY(-5px) scale(1.03); background: #fff; }

        .qr-section { padding-top: 35px; border-top: 2px solid rgba(255,255,255,0.3); }
        .qr-code { background: white; padding: 15px; border-radius: 30px; display: inline-block; }
        .qr-code img { display: block; border-radius: 15px; width: 140px; height: 140px; }
        .qr-text { font-size: 14px; color: var(--text-sub); margin-bottom: 15px; font-weight: 600; }

        /* Tillar va Forma uchun Cyberpunk uslublar */
        .lang-switcher { display: flex; justify-content: flex-end; gap: 10px; margin-bottom: 20px; }
        .lang-btn { background: rgba(255,255,255,0.2); border: none; padding: 5px 15px; border-radius: 12px; cursor: pointer; color: var(--text-main); font-weight: bold; }
        .lang-btn.active { background: var(--primary); color: white; }

        .lead-form { background: rgba(0,0,0,0.5); padding: 25px; border-radius: 20px; margin-top: 30px; border: 1px solid #00ffcc; box-shadow: 0 0 15px rgba(0, 255, 204, 0.2); text-align: left;}
        .lead-form h3 { color: #00ffcc; text-shadow: 0 0 10px rgba(0, 255, 204, 0.5); margin-top: 0;}
        .lead-input { width: 100%; padding: 12px; margin-bottom: 15px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); color: white; border-radius: 10px; }
        .lead-input::placeholder { color: #ccc; }
        .neon-submit { width: 100%; padding: 12px; background: transparent; color: #00ffcc; border: 2px solid #00ffcc; border-radius: 10px; font-weight: bold; text-transform: uppercase; cursor: pointer; transition: 0.3s; }
        .neon-submit:hover { background: #00ffcc; color: black; box-shadow: 0 0 20px #00ffcc; }

        .portfolio-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .portfolio-grid img { width: 100%; height: 120px; object-fit: cover; border-radius: 15px; border: 1px solid rgba(255,255,255,0.3); }

        /* Suzuvchi Aloqa Tugmasi (FAB) - Neon effektli */
        .fab-container { position: fixed; bottom: 30px; right: 30px; z-index: 1000; }
        .fab-main { width: 60px; height: 60px; background: #00ffcc; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; color: #000; box-shadow: 0 0 20px #00ffcc; cursor: pointer; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(0, 255, 204, 0.7); } 70% { box-shadow: 0 0 0 20px rgba(0, 255, 204, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 255, 204, 0); } }

        /* FAQ Akkordeon */
        .faq-details { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 15px; margin-bottom: 10px; padding: 15px; color: var(--text-main); }
        .faq-details summary { font-weight: bold; cursor: pointer; outline: none; }
        .faq-details p { margin-top: 10px; font-size: 14px; opacity: 0.9; }

        /* Testimonials (Sharhlar) */
        .testimonial-card { background: rgba(0,0,0,0.4); border: 1px solid #c084fc; padding: 20px; border-radius: 20px; margin-bottom: 15px; color: white; box-shadow: 0 0 10px rgba(192, 132, 252, 0.2); }
        .stars { color: #fbbf24; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="glass-card">
        <div class="lang-switcher">
            <button class="lang-btn active" onclick="changeLang('uz')">UZ</button>
            <button class="lang-btn" onclick="changeLang('ru')">RU</button>
            <button class="lang-btn" onclick="changeLang('en')">EN</button>
        </div>
        <div class="logo-container">
            <div id="profileImage" class="profile-pic">
                <i class="fa-solid fa-graduation-cap"></i>
            </div>
        </div>
        
        <h1 id="displayName">Yulklanmoqda...</h1>
        <p class="subtitle" id="displaySubtitle">...</p>

        <div class="actions-row">
            <button class="action-btn" onclick="saveVCard()"><i class="fa-solid fa-user-plus"></i> Saqlash</button>
            <button class="action-btn secondary" onclick="copyURL()"><i class="fa-solid fa-copy"></i> Ulashish</button>
        </div>

        <div id="servicesContainer" style="text-align: left; margin-bottom: 30px;"></div>

        <div id="buttonsContainer" class="buttons-grid"></div>

        <div id="portfolioView" class="portfolio-grid"></div>

        <div id="testimonialsView" style="margin-top: 30px; text-align: left;"></div>
        <div id="faqView" style="margin-top: 30px; text-align: left;"></div>

        <div id="leadFormContainer" class="lead-form" style="display: none;">
            <h3 id="formTitle">Qabulga Yozilish</h3>
            <input type="text" id="leadName" class="lead-input" placeholder="Ismingiz">
            <input type="tel" id="leadPhone" class="lead-input" placeholder="Telefon raqamingiz">
            <input type="datetime-local" id="leadDate" class="lead-input" style="color-scheme: dark;">
            <button class="neon-submit" onclick="submitLead()" id="formBtn">Jo'natish</button>
        </div>

        <div class="qr-section">
            <div class="qr-text">Kontaktni saqlash uchun skanerlang</div>
            <div class="qr-code"><img id="qr-image" src="" alt="QR"></div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <script>
        // --- FIREBASE CONFIG START ---
        const firebaseConfig = {
            apiKey: "AIzaSyAl02Ql56-IiDhgO4EgCJJ4JBGn06d9nNI",
            authDomain: "obsidian-os-mini.firebaseapp.com",
            databaseURL: "https://obsidian-os-mini-default-rtdb.firebaseio.com",
            projectId: "obsidian-os-mini",
            storageBucket: "obsidian-os-mini.firebasestorage.app",
            messagingSenderId: "831047629315",
            appId: "1:831047629315:web:78873df1139c3910602c36"
        };
        // --- FIREBASE CONFIG END ---

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const iconMap = {
            'telegram': 'fa-brands fa-telegram',
            'instagram': 'fa-brands fa-instagram',
            'phone': 'fa-solid fa-phone',
            'location': 'fa-solid fa-location-dot',
            'website': 'fa-solid fa-globe',
            'youtube': 'fa-brands fa-youtube',
            'facebook': 'fa-brands fa-facebook',
            'tiktok': 'fa-brands fa-tiktok',
            'linkedin': 'fa-brands fa-linkedin'
        };

        const urlParams = new URLSearchParams(window.location.search);
        const slug = urlParams.get('s');
        let globalData = null;

        // Til lug'ati
        const translations = {
            uz: { save: "Saqlash", share: "Ulashish", services: "Xizmatlarimiz", formTitle: "Qabulga Yozilish", formBtn: "Jo'natish", qr: "Kontaktni saqlash uchun skanerlang", alertOk: "Arizangiz qabul qilindi!", alertErr: "Xatolik yuz berdi." },
            ru: { save: "Сохранить", share: "Поделиться", services: "Наши услуги", formTitle: "Запись на прием", formBtn: "Отправить", qr: "Отсканируйте для сохранения", alertOk: "Ваша заявка принята!", alertErr: "Произошла ошибка." },
            en: { save: "Save", share: "Share", services: "Our Services", formTitle: "Book an Appointment", formBtn: "Submit", qr: "Scan to save contact", alertOk: "Your request is submitted!", alertErr: "An error occurred." }
        };

        let currentLang = 'uz';

        function changeLang(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            
            // Matnlarni almashtirish
            document.querySelector('.action-btn').innerHTML = `<i class="fa-solid fa-user-plus"></i> ${translations[lang].save}`;
            document.querySelector('.action-btn.secondary').innerHTML = `<i class="fa-solid fa-copy"></i> ${translations[lang].share}`;
            document.querySelector('.qr-text').innerText = translations[lang].qr;
            document.getElementById('formTitle').innerText = translations[lang].formTitle;
            document.getElementById('formBtn').innerText = translations[lang].formBtn;
            
            if(document.querySelector('.service-title')) {
                document.querySelector('.service-title').innerHTML = `<i class="fa-solid fa-briefcase"></i> ${translations[lang].services}`;
            }
        }
        
        if(slug) {
            db.ref('projects/' + slug).once('value', (snapshot) => {
                const data = snapshot.val();
                if(data) {
                    globalData = data;
                    
                    // 1. ANALITIKA: Ko'rishlar sonini 1 taga oshirish
                    db.ref(`projects/${slug}/views`).set(firebase.database.ServerValue.increment(1));

                    // 2. SEO METATAGLARNI O'RNATISH
                    if(data.seoDesc) {
                        let metaDesc = document.createElement('meta');
                        metaDesc.name = "description"; metaDesc.content = data.seoDesc;
                        document.head.appendChild(metaDesc);
                    }
                    if(data.seoKeywords) {
                        let metaKey = document.createElement('meta');
                        metaKey.name = "keywords"; metaKey.content = data.seoKeywords;
                        document.head.appendChild(metaKey);
                    }
                    document.title = data.companyName + " | " + (data.subtitle || "Profil");

                    if(data.theme) document.body.style.background = data.theme;
                    document.getElementById('displayName').innerText = data.companyName;
                    document.getElementById('displaySubtitle').innerText = data.subtitle;

                    const profileDiv = document.getElementById('profileImage');
                    if(data.logoUrl && data.logoUrl.trim() !== "") {
                        profileDiv.innerHTML = `<img src="${data.logoUrl}" style="width:100%; height:100%; object-fit:cover;">`;
                    }

                    const sContainer = document.getElementById('servicesContainer');
                    if(data.services && data.services.length > 0) {
                        sContainer.innerHTML = `<div class="service-title"><i class="fa-solid fa-briefcase"></i> Xizmatlarimiz</div>`;
                        data.services.forEach(s => {
                            sContainer.innerHTML += `
                                <div class="service-card">
                                    <div class="s-name">${s.title}</div>
                                    <div class="s-desc">${s.desc}</div>
                                    ${s.price ? `<div class="s-price">${s.price}</div>` : ''}
                                </div>
                            `;
                        });
                    }

                    // 3. PORTFOLIO render qilish
                    if(data.portfolio && data.portfolio.length > 0) {
                        const pCont = document.getElementById('portfolioView');
                        data.portfolio.forEach(url => {
                            pCont.innerHTML += `<img src="${url}" alt="Portfolio">`;
                        });
                    }

                    // 4. SHARHLARNI KURSATISH
                    if(data.testimonials && data.testimonials.length > 0) {
                        const tCont = document.getElementById('testimonialsView');
                        tCont.innerHTML = `<h3 style="color: #0f172a; margin-bottom: 15px;"><i class="fa-solid fa-star"></i> Mijozlar fikri</h3>`;
                        data.testimonials.forEach(t => {
                            let starsHtml = '★'.repeat(t.rating) + '☆'.repeat(5 - t.rating);
                            tCont.innerHTML += `
                                <div class="testimonial-card">
                                    <div class="stars">${starsHtml}</div>
                                    <div style="font-style: italic; margin-bottom: 10px;">"${t.text}"</div>
                                    <div style="font-weight: bold; text-align: right; font-size: 14px;">- ${t.name}</div>
                                </div>
                            `;
                        });
                    }

                    // 5. FAQ KO'RSATISH
                    if(data.faqs && data.faqs.length > 0) {
                        const fCont = document.getElementById('faqView');
                        fCont.innerHTML = `<h3 style="color: #0f172a; margin-bottom: 15px;"><i class="fa-solid fa-circle-question"></i> Savol-Javob</h3>`;
                        data.faqs.forEach(f => {
                            fCont.innerHTML += `
                                <details class="faq-details">
                                    <summary>${f.q}</summary>
                                    <p>${f.a}</p>
                                </details>
                            `;
                        });
                    }

                    const bContainer = document.getElementById('buttonsContainer');
                    if(data.links) {
                        data.links.forEach((link, idx) => {
                            const iconClass = iconMap[link.type] || 'fa-solid fa-link';
                            const colorClass = `color-${link.type}`;
                            const a = document.createElement('a');
                            a.href = link.url;
                            a.className = `btn ${colorClass}`;
                            a.target = "_blank";
                            // Analitika
                            a.onclick = () => db.ref(`projects/${slug}/clicks`).set(firebase.database.ServerValue.increment(1)); 
                            a.style.animation = `cardAppear 0.5s ease forwards ${0.3 + (idx * 0.1)}s`;
                            a.style.opacity = '0';
                            a.innerHTML = `<i class="${iconClass}"></i> ${link.label}`;
                            bContainer.appendChild(a);
                        });
                    }

                    // 3. ARIZA FORMASINI ko'rsatish (agar bot ulangan bo'lsa)
                    if(data.tgToken && data.tgChatId) {
                        document.getElementById('leadFormContainer').style.display = 'block';
                    }

                    const vCard = `BEGIN:VCARD\nVERSION:3.0\nFN:${data.companyName}\nORG:${data.companyName}\nTITLE:${data.subtitle}\n${data.links ? data.links.map(l => `URL:${l.url}`).join('\n') : ''}\nEND:VCARD`;
                    const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(vCard)}`;
                    document.getElementById('qr-image').src = qrUrl;
                } else {
                    showError();
                }
            });
        } else {
            showError();
        }

        // TELEGRAM BOT GA XABAR JO'NATISH
        async function submitLead() {
            if(!globalData || !globalData.tgToken) return;
            
            const name = document.getElementById('leadName').value;
            const phone = document.getElementById('leadPhone').value;
            const date = document.getElementById('leadDate').value; // Yangi
            if(!name || !phone) return alert('Iltimos, ism va raqamni kiriting!');

            const text = `🔔 YANGI ARIZA/QABUL!\n\n👤 Mijoz: ${name}\n📞 Tel: ${phone}\n📅 Belgilangan vaqt: ${date || 'Ko\'rsatilmagan'}\n🏢 Sayt: ${globalData.companyName}`;
            const url = `https://api.telegram.org/bot${globalData.tgToken}/sendMessage?chat_id=${globalData.tgChatId}&text=${encodeURIComponent(text)}`;

            const btn = document.getElementById('formBtn');
            btn.innerText = "Jo'natilmoqda...";

            try {
                const response = await fetch(url);
                if(response.ok) {
                    alert(translations[currentLang].alertOk);
                    document.getElementById('leadName').value = '';
                    document.getElementById('leadPhone').value = '';
                    document.getElementById('leadDate').value = '';
                } else {
                    alert(translations[currentLang].alertErr);
                }
            } catch(e) {
                alert("Xatolik: " + e.message);
            } finally {
                btn.innerText = translations[currentLang].formBtn;
            }
        }

        function showError() {
            document.getElementById('displayName').innerText = "Loyiha topilmadi";
            document.getElementById('displaySubtitle').innerText = "Admin panelda loyiha yarating.";
            document.querySelector('.actions-row').style.display = 'none';
        }

        function saveVCard() {
            if(!globalData) return;
            const vCardData = `BEGIN:VCARD\nVERSION:3.0\nFN:${globalData.companyName}\nORG:${globalData.companyName}\nTITLE:${globalData.subtitle}\n${globalData.links ? globalData.links.map(l => `URL:${l.url}`).join('\n') : ''}\nEND:VCARD`;
            const blob = new Blob([vCardData], { type: "text/vcard" });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${globalData.companyName}.vcf`;
            a.click();
        }

        function copyURL() {
            navigator.clipboard.writeText(window.location.href);
            alert("Ssilka nusxalandi!");
        }
    </script>
    <div class="fab-container">
        <div class="fab-main" onclick="document.getElementById('leadName').focus()">
            <i class="fa-solid fa-calendar-check"></i>
        </div>
    </div>
</body>
</html>
